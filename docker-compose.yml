services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workload_tracking}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # DM-R-25 — WAL archive destination. Bind-mounted to ./.wal-archive
      # so off-host replication (DM-R-27) can ship it without touching
      # Postgres internals.
      - ./.wal-archive:/wal-archive
    # DM-R-25 — Continuous PITR configuration. Archive mode on, WAL files
    # copied into /wal-archive (persisted across container restarts).
    # `wal_level=replica` is the default in PG 16 but re-asserted here so
    # the config is explicit. Archive-timeout forces a WAL rotation every
    # 60s so a quiet DB still produces at least one archive per minute
    # (recovery RPO ≤ 60s).
    command:
      - postgres
      - -c
      - archive_mode=on
      - -c
      - archive_command=test ! -f /wal-archive/%f && cp %p /wal-archive/%f
      - -c
      - archive_timeout=60
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=3
      # DM-8-9 — query observability. pg_stat_statements records the top
      # queries by total time; auto_explain logs slow-query plans.
      # `shared_preload_libraries` must be set at server start (not via
      # ALTER SYSTEM); that's what docker-compose `command` gives us.
      - -c
      - shared_preload_libraries=pg_stat_statements,auto_explain
      - -c
      - pg_stat_statements.track=all
      - -c
      - auto_explain.log_min_duration=500ms
      - -c
      - auto_explain.log_analyze=true
      - -c
      - auto_explain.log_buffers=true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT:-3000}
      API_PREFIX: ${API_PREFIX:-api}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      # DM-R-20: migrate service uses the app_migrator role when configured;
      # otherwise falls back to the superuser URL for back-compat.
      DATABASE_URL: ${MIGRATE_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-workload_tracking}?schema=public}
      PRISMA_CLI_BINARY_TARGETS: debian-openssl-3.0.x
      # DM-4-4 — every app container runs UTC so the DM-4-5 timestamptz
      # conversion interprets historical `timestamp without time zone`
      # values correctly. The CI gate in prestart-verify-migrations.sh
      # asserts this before boot.
      TZ: UTC
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:generate && npm run prisma:migrate:deploy"
    restart: 'no'

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT:-3000}
      API_PREFIX: ${API_PREFIX:-api}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      # DM-R-20: runtime connection is the DML-only app_runtime role in
      # environments where DATABASE_URL has been flipped over. Default
      # remains the superuser URL for back-compat.
      DATABASE_URL: ${RUNTIME_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-workload_tracking}?schema=public}
      PRISMA_CLI_BINARY_TARGETS: debian-openssl-3.0.x
      # DM-4-4 — every app container runs UTC so the DM-4-5 timestamptz
      # conversion interprets historical `timestamp without time zone`
      # values correctly. The CI gate in prestart-verify-migrations.sh
      # asserts this before boot.
      TZ: UTC
      NODE_OPTIONS: '--max-old-space-size=1536'
      # DM-R-26: agent provenance — stamped into Postgres application_name
      # so every statement, connection, and ddl_audit row can be traced
      # back to the actor. Default `human` when unset.
      AGENT_ID: ${AGENT_ID:-human}
      SERVICE_NAME: backend
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - '${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}'
    volumes:
      - .:/app
      - backend-node_modules:/app/node_modules
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    command: sh -c "npm run db:generate && npm run start:dev"
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:${BACKEND_PORT:-3000}/${API_PREFIX:-api}/health >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  seed:
    profiles: ['tools']
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT:-3000}
      API_PREFIX: ${API_PREFIX:-api}
      # DM-R-20: seeding touches audit tables; requires app_migrator (or
      # the superuser fallback).
      DATABASE_URL: ${MIGRATE_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-workload_tracking}?schema=public}
      PRISMA_CLI_BINARY_TARGETS: debian-openssl-3.0.x
      # DM-4-4 — every app container runs UTC so the DM-4-5 timestamptz
      # conversion interprets historical `timestamp without time zone`
      # values correctly. The CI gate in prestart-verify-migrations.sh
      # asserts this before boot.
      TZ: UTC
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: sh -c "npm run db:generate && npm run db:seed"
    restart: 'no'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api}
      CHOKIDAR_USEPOLLING: 'true'
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    volumes:
      - ./frontend:/app
      - frontend-node_modules:/app/node_modules
    deploy:
      resources:
        limits:
          memory: 1G
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5173"
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:5173 >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  mock-data-generator:
    profiles: ['tools']
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      NODE_ENV: development
      # DM-R-20: same as seed service — needs app_migrator for full DML + DDL.
      DATABASE_URL: ${MIGRATE_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-workload_tracking}?schema=public}
      PRISMA_CLI_BINARY_TARGETS: debian-openssl-3.0.x
      # DM-4-4 — every app container runs UTC so the DM-4-5 timestamptz
      # conversion interprets historical `timestamp without time zone`
      # values correctly. The CI gate in prestart-verify-migrations.sh
      # asserts this before boot.
      TZ: UTC
      SEED_PROFILE: realistic
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: sh -c "npm run db:generate && npm run db:seed"
    restart: 'no'

  monitoring:
    profiles: ['monitoring']
    image: amir20/dozzle:v8.14.6
    environment:
      DOZZLE_NO_ANALYTICS: 'true'
      DOZZLE_LEVEL: info
    ports:
      - '${MONITORING_PORT:-8081}:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  ldap-test:
    profiles: ['tools']
    image: bitnami/openldap:2.6
    environment:
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: admin_password
      LDAP_USERS: ldapuser1,ldapuser2
      LDAP_PASSWORDS: Password1!,Password2!
      LDAP_ROOT: dc=deliverycentral,dc=local
      LDAP_ADMIN_DN: cn=admin,dc=deliverycentral,dc=local
    ports:
      - '${LDAP_PORT:-1389}:1389'
    healthcheck:
      test: ['CMD', 'ldapsearch', '-x', '-H', 'ldap://127.0.0.1:1389', '-b', 'dc=deliverycentral,dc=local', '-D', 'cn=admin,dc=deliverycentral,dc=local', '-w', 'admin_password']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  monitoring-agent:
    profiles: ['monitoring']
    image: timberio/vector:0.39.0-alpine
    environment:
      VECTOR_LOG: info
    ports:
      - '${MONITORING_AGENT_PORT:-8686}:8686'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ops/vector/vector.toml:/etc/vector/vector.toml:ro
    command: ['--config', '/etc/vector/vector.toml']
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:8686/health >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
  backend-node_modules:
  frontend-node_modules:
