services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workload_tracking}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT:-3000}
      API_PREFIX: ${API_PREFIX:-api}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-workload_tracking}?schema=public
      PRISMA_CLI_BINARY_TARGETS: debian-openssl-3.0.x
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy"
    restart: 'no'

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT:-3000}
      API_PREFIX: ${API_PREFIX:-api}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-workload_tracking}?schema=public
      PRISMA_CLI_BINARY_TARGETS: debian-openssl-3.0.x
      CHOKIDAR_USEPOLLING: 'true'
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - '${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}'
    volumes:
      - .:/app
      - backend-node_modules:/app/node_modules
    restart: unless-stopped
    command: sh -c "npx prisma generate && npm run start:dev"
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:${BACKEND_PORT:-3000}/${API_PREFIX:-api}/health >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  seed:
    profiles: ['tools']
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT:-3000}
      API_PREFIX: ${API_PREFIX:-api}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-workload_tracking}?schema=public
      PRISMA_CLI_BINARY_TARGETS: debian-openssl-3.0.x
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: sh -c "npx prisma generate && npx ts-node --transpile-only --project tsconfig.json prisma/seed.ts"
    restart: 'no'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api}
      CHOKIDAR_USEPOLLING: 'true'
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    volumes:
      - ./frontend:/app
      - frontend-node_modules:/app/node_modules
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5173"
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:5173 >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  mock-data-generator:
    profiles: ['tools']
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-workload_tracking}?schema=public
      PRISMA_CLI_BINARY_TARGETS: debian-openssl-3.0.x
      SEED_PROFILE: realistic
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: sh -c "npx prisma generate && npx ts-node --transpile-only --project tsconfig.json prisma/seed.ts"
    restart: 'no'

  monitoring:
    profiles: ['monitoring']
    image: amir20/dozzle:v8.14.6
    environment:
      DOZZLE_NO_ANALYTICS: 'true'
      DOZZLE_LEVEL: info
    ports:
      - '${MONITORING_PORT:-8081}:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  ldap-test:
    profiles: ['tools']
    image: bitnami/openldap:2.6
    environment:
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: admin_password
      LDAP_USERS: ldapuser1,ldapuser2
      LDAP_PASSWORDS: Password1!,Password2!
      LDAP_ROOT: dc=deliverycentral,dc=local
      LDAP_ADMIN_DN: cn=admin,dc=deliverycentral,dc=local
    ports:
      - '${LDAP_PORT:-1389}:1389'
    healthcheck:
      test: ['CMD', 'ldapsearch', '-x', '-H', 'ldap://127.0.0.1:1389', '-b', 'dc=deliverycentral,dc=local', '-D', 'cn=admin,dc=deliverycentral,dc=local', '-w', 'admin_password']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  monitoring-agent:
    profiles: ['monitoring']
    image: timberio/vector:0.39.0-alpine
    environment:
      VECTOR_LOG: info
    ports:
      - '${MONITORING_AGENT_PORT:-8686}:8686'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ops/vector/vector.toml:/etc/vector/vector.toml:ro
    command: ['--config', '/etc/vector/vector.toml']
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:8686/health >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
  backend-node_modules:
  frontend-node_modules:
