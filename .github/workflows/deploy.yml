name: deploy

# DM-R-19 — staging-first deploy gate.
#
# Flow:
#   build-and-push  →  deploy-staging (if enabled)  →  deploy-production
#
# The deploy-production job depends on deploy-staging. If staging is
# disabled (vars.STAGING_DEPLOY_ENABLED != 'true'), deploy-staging is
# skipped via GitHub's `if:` condition and deploy-production runs alone
# — with a loud warning in its output.
#
# "6-hour freshness" (from the plan): inside a single workflow run,
# deploy-staging → deploy-production is inherently fresh. For out-of-band
# prod deploys, the `workflow_dispatch` path below requires a recent
# staging run for the same SHA.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - staging-and-prod
          - staging-only
          - prod-only
        default: staging-and-prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag
        id: meta
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Build and push backend
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: .
          file: Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/deliverycentral-backend:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/deliverycentral-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/deliverycentral-frontend:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/deliverycentral-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to staging (DM-R-19)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: staging
    # Skip when staging infrastructure is not configured, or when a manual
    # workflow_dispatch targets prod-only.
    if: |
      vars.STAGING_DEPLOY_ENABLED == 'true' &&
      (github.event_name != 'workflow_dispatch' ||
       github.event.inputs.target == 'staging-and-prod' ||
       github.event.inputs.target == 'staging-only')

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_VPS_SSH_KEY }}

      - name: Add VM host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH (staging)
        env:
          STAGING_HOST: ${{ secrets.STAGING_VPS_HOST }}
          STAGING_USER: ${{ secrets.STAGING_VPS_USER }}
          STAGING_DOMAIN: ${{ secrets.STAGING_CADDY_DOMAIN }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -l deploy "$STAGING_HOST" bash <<EOF
            set -e
            cd /opt/deliverycentral-staging
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            CURRENT_BACKEND=\$(docker inspect dc-staging-backend-1 --format '{{.Config.Image}}' 2>/dev/null || echo '')
            CURRENT_FRONTEND=\$(docker inspect dc-staging-frontend-1 --format '{{.Config.Image}}' 2>/dev/null || echo '')
            echo "\$CURRENT_BACKEND"  > .previous-backend-image
            echo "\$CURRENT_FRONTEND" > .previous-frontend-image

            export BACKEND_IMAGE=ghcr.io/$GHCR_OWNER/deliverycentral-backend:$IMAGE_TAG
            export FRONTEND_IMAGE=ghcr.io/$GHCR_OWNER/deliverycentral-frontend:$IMAGE_TAG
            docker compose -p dc-staging -f docker-compose.prod.yml pull
            docker compose -p dc-staging -f docker-compose.prod.yml up -d --no-build migrate
            docker compose -p dc-staging -f docker-compose.prod.yml wait migrate
            docker compose -p dc-staging -f docker-compose.prod.yml up -d --no-build backend frontend
            echo "$DEPLOY_SHA" > /opt/deliverycentral-staging/.current-sha
            sleep 20
            curl -sf "https://$STAGING_DOMAIN/api/health" > /dev/null
            curl -sf "https://$STAGING_DOMAIN/api/health/deep" | grep -q '"status":"ready"' \
              || { echo "deep health failed"; exit 1; }
          EOF

      - name: Staging deploy marker
        # Writes a tiny artifact + run-level output the prod job (or a
        # future out-of-band prod-only dispatch) can check.
        run: |
          echo "staging_ok=true" >> "$GITHUB_OUTPUT"
          echo "staging_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Staging deploy green::SHA=${{ github.sha }} at $(date -u +%FT%TZ)"

  # Guard job for out-of-band workflow_dispatch prod-only deploys — checks
  # that staging has a successful run for this SHA in the last 6 hours.
  verify-staging-freshness:
    name: Verify staging freshness (DM-R-19 6h rule)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.target == 'prod-only' &&
      vars.STAGING_DEPLOY_ENABLED == 'true'
    permissions:
      actions: read
    steps:
      - name: Check recent green staging run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Most recent successful deploy-staging run for this SHA.
          set -euo pipefail
          SINCE_EPOCH=$(( $(date -u +%s) - 21600 ))   # now - 6h
          REPO=${{ github.repository }}
          # list runs for this workflow, filter by SHA + conclusion=success, look at deploy-staging job status
          RUN_JSON=$(gh api "repos/$REPO/actions/workflows/deploy.yml/runs?head_sha=${{ github.sha }}&status=completed&per_page=20" --jq '.workflow_runs[] | select(.conclusion == "success")')
          if [ -z "$RUN_JSON" ]; then
            echo "::error::No successful deploy workflow run found for SHA ${{ github.sha }}"
            exit 1
          fi
          MOST_RECENT_END=$(echo "$RUN_JSON" | jq -rs 'sort_by(.updated_at) | reverse | .[0].updated_at')
          MOST_RECENT_EPOCH=$(date -u -d "$MOST_RECENT_END" +%s)
          if [ "$MOST_RECENT_EPOCH" -lt "$SINCE_EPOCH" ]; then
            AGE_HOURS=$(( ( $(date -u +%s) - MOST_RECENT_EPOCH ) / 3600 ))
            echo "::error::Last staging green for this SHA was ${AGE_HOURS}h ago — older than the 6h DM-R-19 gate. Re-run deploy-staging first."
            exit 1
          fi
          echo "✓ Staging ran green at $MOST_RECENT_END (within 6h) for SHA ${{ github.sha }}"

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - deploy-staging
      - verify-staging-freshness
    environment: production
    # Gate: skip deploy-prod if deploy-staging FAILED (unless explicitly skipped by workflow_dispatch + prod-only path
    # where the freshness gate above covers it, or by STAGING_DEPLOY_ENABLED=false).
    if: |
      always() &&
      !cancelled() &&
      vars.PRODUCTION_DEPLOY_ENABLED == 'true' &&
      needs.build-and-push.result == 'success' &&
      (
        needs.deploy-staging.result == 'success' ||
        needs.deploy-staging.result == 'skipped'
      ) &&
      (
        needs.verify-staging-freshness.result == 'success' ||
        needs.verify-staging-freshness.result == 'skipped'
      ) &&
      (
        github.event_name != 'workflow_dispatch' ||
        github.event.inputs.target != 'staging-only'
      )

    steps:
      - name: Warn if staging was skipped
        if: needs.deploy-staging.result == 'skipped'
        run: |
          echo "::warning title=Staging skipped::deploy-staging did not run (STAGING_DEPLOY_ENABLED=${{ vars.STAGING_DEPLOY_ENABLED }}, target=${{ github.event.inputs.target }}). Production deploy is proceeding without a staging smoke. Enable staging to close this gap."

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VM host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH (production)
        env:
          PROD_HOST: ${{ secrets.VPS_HOST }}
          PROD_USER: ${{ secrets.VPS_USER }}
          PROD_DOMAIN: ${{ secrets.CADDY_DOMAIN }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -l deploy "$PROD_HOST" bash <<EOF
            set -e
            cd /opt/deliverycentral
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            CURRENT_BACKEND=\$(docker inspect dc-prod-backend-1 --format '{{.Config.Image}}' 2>/dev/null || echo '')
            CURRENT_FRONTEND=\$(docker inspect dc-prod-frontend-1 --format '{{.Config.Image}}' 2>/dev/null || echo '')
            echo "\$CURRENT_BACKEND"  > .previous-backend-image
            echo "\$CURRENT_FRONTEND" > .previous-frontend-image

            export BACKEND_IMAGE=ghcr.io/$GHCR_OWNER/deliverycentral-backend:$IMAGE_TAG
            export FRONTEND_IMAGE=ghcr.io/$GHCR_OWNER/deliverycentral-frontend:$IMAGE_TAG
            docker compose -p dc-prod -f docker-compose.prod.yml pull

            docker compose -p dc-prod -f docker-compose.prod.yml up -d --no-build migrate
            docker compose -p dc-prod -f docker-compose.prod.yml wait migrate
            docker compose -p dc-prod -f docker-compose.prod.yml up -d --no-build backend frontend
            echo "$DEPLOY_SHA" > /opt/deliverycentral/.current-sha

            sleep 15
            rollback() {
              echo "Health check failed — rolling back to previous images"
              if [ -n "\$CURRENT_BACKEND" ] && [ -n "\$CURRENT_FRONTEND" ]; then
                export BACKEND_IMAGE="\$CURRENT_BACKEND"
                export FRONTEND_IMAGE="\$CURRENT_FRONTEND"
                docker compose -p dc-prod -f docker-compose.prod.yml pull
                docker compose -p dc-prod -f docker-compose.prod.yml up -d --no-build backend frontend
              else
                echo "::warning::No previous images recorded (first deploy?). Cannot roll back automatically."
              fi
              exit 1
            }
            curl -sf "https://$PROD_DOMAIN/api/health" || rollback
            curl -sf "https://$PROD_DOMAIN/api/health/deep" | grep -q '"status":"ready"' || rollback

            echo "Deploy $IMAGE_TAG successful"
          EOF
