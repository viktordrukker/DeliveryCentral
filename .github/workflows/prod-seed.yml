name: prod-seed

# Manually run the prisma seed script against the **production** VPS DB.
#
# DANGER: this WIPES every populated table via `clearExistingData()` in
# `prisma/seed.ts` before re-seeding. Two guardrails sit between dispatch
# and execution:
#
#   1. `environment: production` — GitHub Required Reviewers gate
#      (configure in Settings → Environments → production).
#   2. `inputs.confirm` — operator must type the literal string
#      `WIPE-PROD-DB` to acknowledge the destructive operation.
#
# Mechanically identical to staging-seed.yml: the production image
# strips dev-deps, so we install ts-node@10 inside the running backend
# container and execute the seed via ts-node. See
# docs/deployment/preprod-hetzner.md §6 for the original recipe.
#
# Picking a profile: see `prisma/seed.ts` for the available datasets.
# `it-company` is the canonical 200-person scenario and the default.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Seed profile to load on production.'
        required: true
        type: choice
        options:
          - it-company
          - phase2
          - demo
          - life-demo
          - investor-demo
        default: it-company
      confirm:
        description: 'Type WIPE-PROD-DB to confirm. Anything else aborts.'
        required: true
        type: string
        default: ''

concurrency:
  group: prod-seed
  cancel-in-progress: false

jobs:
  seed:
    name: Run prisma/seed.ts on production (profile=${{ inputs.profile }})
    runs-on: ubuntu-latest
    environment: production
    if: vars.PROD_DEPLOY_ENABLED == 'true'

    steps:
      - name: Confirm operator typed WIPE-PROD-DB
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "WIPE-PROD-DB" ]; then
            echo "::error::Confirm field did not match the required literal 'WIPE-PROD-DB'."
            exit 1
          fi
          echo "Confirm OK — proceeding."

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_VPS_SSH_KEY }}

      - name: Add VM host key
        env:
          PROD_HOST: ${{ secrets.PROD_VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$PROD_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run seed via SSH
        env:
          PROD_HOST: ${{ secrets.PROD_VPS_HOST }}
          SEED_PROFILE: ${{ inputs.profile }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -l deploy "$PROD_HOST" bash <<EOF
            set -e
            cd /opt/deliverycentral

            # Sync the working tree to the latest main commit so docker cp
            # below copies the current seed sources (this workflow does not
            # run via promote-to-prod, so the on-VM tree might be stale).
            git fetch origin main && git reset --hard origin/main

            if ! docker compose -p dc-prod -f docker-compose.prod.yml ps backend | grep -q 'Up'; then
              echo "::error::backend container is not Up — run promote-to-prod first"
              exit 1
            fi

            # Inject seed sources into the running container (production
            # image strips them — only schema.prisma + migrations are baked in).
            docker exec dc-prod-backend-1 rm -rf /app/prisma/seeds
            docker exec dc-prod-backend-1 mkdir -p /app/prisma/seeds
            docker cp tsconfig.json dc-prod-backend-1:/app/tsconfig.json
            docker cp prisma/seed.ts dc-prod-backend-1:/app/prisma/seed.ts
            for f in prisma/seeds/*.ts prisma/seeds/README.md; do
              [ -f "\$f" ] && docker cp "\$f" "dc-prod-backend-1:/app/prisma/seeds/\$(basename \$f)"
            done

            docker compose -p dc-prod -f docker-compose.prod.yml exec -T \
              -e HOME=/tmp \
              -e NODE_ENV=development \
              -e SEED_PROFILE=$SEED_PROFILE \
              backend sh -c '
                set -e
                cd /app
                npm install --no-save --no-audit ts-node@10 typescript@5 >/dev/null 2>&1
                NODE_ENV=production node_modules/.bin/ts-node --transpile-only --project tsconfig.json prisma/seed.ts
              '
          EOF

      - name: Verify deep health after seed
        env:
          PROD_DOMAIN: ${{ secrets.PROD_CADDY_DOMAIN }}
        run: |
          curl -sf "https://$PROD_DOMAIN/api/health/deep" | grep -q '"status":"ready"' \
            || { echo "::error::deep health failed after seed"; exit 1; }
          echo "::notice title=Prod seed complete::profile=${{ inputs.profile }}"
