name: ci

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  backend-fast:
    name: Backend fast checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Architecture check
        run: npm run architecture:check

      - name: Contracts validate
        run: npm run contracts:validate

      - name: Fast Jest suite
        run: npm run test:fast

      - name: JTBD coverage summary
        run: npm run jtbd:summary

      - name: Design token guardrail
        run: npm run tokens:check

      - name: Audit dependencies
        run: npm audit --audit-level=moderate || true

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

  backend-db:
    name: Backend DB-coupled checks
    runs-on: ubuntu-latest
    needs: [backend-fast]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: DB Jest suite
        run: npm run test:db

  backend-slow:
    name: Backend slow checks
    runs-on: ubuntu-latest
    needs: [backend-db]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Slow Jest suite
        run: npm run test:slow

  build-check:
    name: Production build smoke test
    runs-on: ubuntu-latest
    needs: [backend-fast, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Build backend production image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: .
          file: Dockerfile
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend production image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          tags: deliverycentral-frontend:ci

      - name: Scan frontend image for vulnerabilities
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e2f6a1c0a7f1bf99 # v0.24
        with:
          image-ref: deliverycentral-frontend:ci
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  e2e-smoke:
    name: E2E smoke merge gate
    runs-on: ubuntu-latest
    needs: [build-check, backend-db, backend-slow]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:e2e:ui:smoke

  e2e-non-smoke:
    name: E2E non-smoke shard ${{ matrix.shard }}/2
    runs-on: ubuntu-latest
    needs: [build-check]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run non-smoke shard
        run: npm run test:e2e:ui -- --grep-invert @smoke --shard=${{ matrix.shard }}/2
