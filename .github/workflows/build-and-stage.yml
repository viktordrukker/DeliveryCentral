name: build-and-stage

# Builds backend + frontend images on every push to main and deploys them to
# staging. Production is reached only via the separate `promote-to-prod.yml`
# workflow — pick a build by image tag and promote it explicitly.
#
# Why split (vs the previous DM-R-19 single-workflow design):
#   - Auto-promoting every green build to prod removed human judgement on
#     which build customers actually receive.
#   - The workflow-level concurrency group covered build+staging+prod, so any
#     in-flight prod deploy halted CI on the next commit.
# Splitting build/staging from prod gives staging room to keep up with main
# while prod waits on an explicit human pick.
#
# Staging marker (read by promote-to-prod):
#   /opt/deliverycentral-staging/.staging-tag             (7-char SHA tag)
#   /opt/deliverycentral-staging/.staging-tag-deployed-at (UTC ISO-8601)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: build-and-stage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag
        id: meta
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Build and push backend
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: .
          file: Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/deliverycentral-backend:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/deliverycentral-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/deliverycentral-frontend:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/deliverycentral-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: staging
    if: vars.STAGING_DEPLOY_ENABLED == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_VPS_SSH_KEY }}

      - name: Add VM host key
        env:
          STAGING_HOST: ${{ secrets.STAGING_VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH (staging)
        env:
          STAGING_HOST: ${{ secrets.STAGING_VPS_HOST }}
          STAGING_DOMAIN: ${{ secrets.STAGING_CADDY_DOMAIN }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -l deploy "$STAGING_HOST" bash <<EOF
            set -e
            cd /opt/deliverycentral-staging

            git fetch origin main
            git reset --hard origin/main

            rm -f docker-compose.override.yml

            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            CURRENT_BACKEND=\$(docker inspect dc-staging-backend-1 --format '{{.Config.Image}}' 2>/dev/null || echo '')
            CURRENT_FRONTEND=\$(docker inspect dc-staging-frontend-1 --format '{{.Config.Image}}' 2>/dev/null || echo '')
            echo "\$CURRENT_BACKEND"  > .previous-backend-image
            echo "\$CURRENT_FRONTEND" > .previous-frontend-image

            export BACKEND_IMAGE=ghcr.io/$GHCR_OWNER/deliverycentral-backend:$IMAGE_TAG
            export FRONTEND_IMAGE=ghcr.io/$GHCR_OWNER/deliverycentral-frontend:$IMAGE_TAG
            docker compose -p dc-staging -f docker-compose.prod.yml pull
            docker compose -p dc-staging -f docker-compose.prod.yml up -d --no-build migrate
            # Capture exit code from `wait` (returns the container's exit code)
            # so we can surface migrate stdout/stderr in the workflow log when
            # the migration fails, instead of just seeing 'exit 1'.
            MIGRATE_EXIT=\$(docker compose -p dc-staging -f docker-compose.prod.yml wait migrate)
            if [ "\$MIGRATE_EXIT" != "0" ]; then
              echo "::group::migrate container logs (exit=\$MIGRATE_EXIT)"
              docker compose -p dc-staging -f docker-compose.prod.yml logs --no-color --tail=400 migrate || true
              echo "::endgroup::"
              echo "::error::Migrate container exited with code \$MIGRATE_EXIT — see logs above"
              exit 1
            fi
            docker compose -p dc-staging -f docker-compose.prod.yml up -d --no-build backend frontend
            echo "$DEPLOY_SHA" > /opt/deliverycentral-staging/.current-sha

            # Self-healing Caddy refresh: validate template inside the live container
            # before swapping, so a syntactically broken template never takes down the proxy.
            TEMPLATE_PATH=/opt/deliverycentral-staging/ops/templates/data-stack.Caddyfile
            DEPLOYED_PATH=/opt/deliverycentral-data/Caddyfile
            if [ ! -f "\$TEMPLATE_PATH" ]; then
              echo "::warning::Caddy template missing at \$TEMPLATE_PATH — skipping refresh."
            elif [ ! -f "\$DEPLOYED_PATH" ]; then
              echo "::warning::Deployed Caddyfile missing at \$DEPLOYED_PATH — skipping refresh (run ops/bootstrap-app.sh once first)."
            elif diff -q "\$TEMPLATE_PATH" "\$DEPLOYED_PATH" >/dev/null 2>&1; then
              echo "Caddy template unchanged — no refresh needed"
            else
              echo "Caddy template differs from deployed copy — validating + refreshing..."
              docker cp "\$TEMPLATE_PATH" dc-data-caddy-1:/tmp/Caddyfile.new
              if docker exec dc-data-caddy-1 caddy validate --config /tmp/Caddyfile.new --adapter caddyfile; then
                cp "\$TEMPLATE_PATH" "\$DEPLOYED_PATH"
                docker exec dc-data-caddy-1 caddy reload --config /etc/caddy/Caddyfile
                echo "✓ Caddy reloaded with new config"
              else
                echo "::error::caddy validate FAILED on new template — leaving deployed Caddyfile unchanged"
                docker exec dc-data-caddy-1 rm -f /tmp/Caddyfile.new || true
                exit 1
              fi
              docker exec dc-data-caddy-1 rm -f /tmp/Caddyfile.new || true
            fi

            sleep 20
            curl -sf "https://$STAGING_DOMAIN/api/health" > /dev/null
            curl -sf "https://$STAGING_DOMAIN/api/health/deep" | grep -q '"status":"ready"' \
              || { echo "deep health failed"; exit 1; }

            # Promote-to-prod marker — promote-to-prod.yml reads these to enforce
            # the freshness gate. Written only after health checks pass so a
            # broken deploy never appears "fresh".
            echo "$IMAGE_TAG" > /opt/deliverycentral-staging/.staging-tag
            date -u +%FT%TZ  > /opt/deliverycentral-staging/.staging-tag-deployed-at
          EOF

      - name: Staging deploy summary
        run: |
          echo "::notice title=Staging deploy green::TAG=${{ needs.build-and-push.outputs.image_tag }} SHA=${{ github.sha }} at $(date -u +%FT%TZ)"
