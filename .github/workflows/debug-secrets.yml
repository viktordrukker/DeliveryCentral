name: debug-secrets
# One-shot diagnostic — runs only on manual dispatch.
# Tests whether GitHub Secrets values are clean (length, trailing chars,
# non-printable characters) without leaking the actual values.
# DELETE THIS FILE after the v1.3 deployment RCA is complete.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe each non-key secret
        env:
          # Test the values we suspect of corruption
          S_VPS_HOST:             ${{ secrets.VPS_HOST }}
          S_STAGING_VPS_HOST:     ${{ secrets.STAGING_VPS_HOST }}
          S_VPS_USER:             ${{ secrets.VPS_USER }}
          S_STAGING_VPS_USER:     ${{ secrets.STAGING_VPS_USER }}
          S_CADDY_DOMAIN:         ${{ secrets.CADDY_DOMAIN }}
          S_STAGING_CADDY_DOMAIN: ${{ secrets.STAGING_CADDY_DOMAIN }}
          # Expected values (these get committed to the workflow log,
          # which is fine — they're recoverable from public DNS anyway).
          E_VPS_HOST:     "91.99.212.124"
          E_VPS_USER:     "deploy"
          E_CADDY_DOMAIN: "deliverit.agentic.uz"
          E_STAGING_DOMAIN: "deliverit-test.agentic.uz"
        run: |
          probe() {
            local name="$1" expected="$2"
            local actual_var="S_$name"
            local actual="${!actual_var}"
            local exp_len=${#expected}
            local act_len=${#actual}
            local match="MATCH"
            [ "$actual" = "$expected" ] || match="DIFFER"
            local has_newline=no; [[ "$actual" == *$'\n'* ]] && has_newline=yes
            local has_tab=no;     [[ "$actual" == *$'\t'* ]] && has_tab=yes
            local has_cr=no;      [[ "$actual" == *$'\r'* ]] && has_cr=yes
            local first_char="-"
            if [ -n "$actual" ]; then first_char="$(printf %s "$actual" | head -c 1 | xxd -p)"; fi
            local last_char="-"
            if [ -n "$actual" ]; then last_char="$(printf %s "$actual" | tail -c 1 | xxd -p)"; fi
            printf '  %-22s  expected_len=%3d  actual_len=%3d  %s  newline=%s  tab=%s  cr=%s  first_byte=%s  last_byte=%s\n' \
                "$name" "$exp_len" "$act_len" "$match" "$has_newline" "$has_tab" "$has_cr" "$first_char" "$last_char"
          }

          echo "=== Secret integrity probe ==="
          echo "    (compares against expected literal value; reports whitespace flags + first/last byte hex)"
          echo ""
          probe VPS_HOST                "$E_VPS_HOST"
          probe STAGING_VPS_HOST        "$E_VPS_HOST"
          probe VPS_USER                "$E_VPS_USER"
          probe STAGING_VPS_USER        "$E_VPS_USER"
          probe CADDY_DOMAIN            "$E_CADDY_DOMAIN"
          probe STAGING_CADDY_DOMAIN    "$E_STAGING_DOMAIN"
