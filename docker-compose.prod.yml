services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "node_modules/.bin/prisma migrate deploy"
    restart: 'no'

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: ${API_PREFIX:-api}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      AUTH_ISSUER: ${AUTH_ISSUER}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_LOCAL_ENABLED: ${AUTH_LOCAL_ENABLED:-true}
      AUTH_LDAP_ENABLED: ${AUTH_LDAP_ENABLED:-false}
      AUTH_LDAP_URL: ${AUTH_LDAP_URL:-}
      AUTH_LDAP_BIND_DN: ${AUTH_LDAP_BIND_DN:-}
      AUTH_LDAP_BIND_CREDENTIALS: ${AUTH_LDAP_BIND_CREDENTIALS:-}
      AUTH_LDAP_SEARCH_BASE: ${AUTH_LDAP_SEARCH_BASE:-}
      AUTH_LDAP_SEARCH_FILTER: ${AUTH_LDAP_SEARCH_FILTER:-(uid={{username}})}
      AUTH_AZURE_AD_ENABLED: ${AUTH_AZURE_AD_ENABLED:-false}
      AUTH_AZURE_AD_TENANT_ID: ${AUTH_AZURE_AD_TENANT_ID:-}
      AUTH_AZURE_AD_CLIENT_ID: ${AUTH_AZURE_AD_CLIENT_ID:-}
      AUTH_AZURE_AD_CLIENT_SECRET: ${AUTH_AZURE_AD_CLIENT_SECRET:-}
      AUTH_AZURE_AD_REDIRECT_URI: ${AUTH_AZURE_AD_REDIRECT_URI:-}
      AUTH_ACCESS_TOKEN_EXPIRES_IN: ${AUTH_ACCESS_TOKEN_EXPIRES_IN:-900}
      AUTH_REFRESH_TOKEN_EXPIRES_IN: ${AUTH_REFRESH_TOKEN_EXPIRES_IN:-604800}
      AUTH_2FA_ENFORCE_ROLES: ${AUTH_2FA_ENFORCE_ROLES:-admin,director,hr_manager,resource_manager,project_manager,delivery_manager}
      AUTH_2FA_TOTP_ISSUER: ${AUTH_2FA_TOTP_ISSUER:-DeliveryCentral}
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      NOTIFICATIONS_SMTP_HOST: ${NOTIFICATIONS_SMTP_HOST:-}
      NOTIFICATIONS_SMTP_PORT: ${NOTIFICATIONS_SMTP_PORT:-587}
      NOTIFICATIONS_SMTP_SECURE: ${NOTIFICATIONS_SMTP_SECURE:-false}
      NOTIFICATIONS_SMTP_USERNAME: ${NOTIFICATIONS_SMTP_USERNAME:-}
      NOTIFICATIONS_SMTP_PASSWORD: ${NOTIFICATIONS_SMTP_PASSWORD:-}
      NOTIFICATIONS_EMAIL_FROM_ADDRESS: ${NOTIFICATIONS_EMAIL_FROM_ADDRESS}
      NOTIFICATIONS_EMAIL_FROM_NAME: ${NOTIFICATIONS_EMAIL_FROM_NAME:-DeliveryCentral}
      SERVICE_NAME: ${SERVICE_NAME:-workload-tracking-platform}
      LOG_LEVEL: ${LOG_LEVEL:-log,warn,error}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:3000/api/health > /dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:80/ > /dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
