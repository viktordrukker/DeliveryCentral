# Per-stack production compose. Used twice on the VM:
#   /opt/deliverycentral/           (project: dc-prod,    .env: prod)
#   /opt/deliverycentral-staging/   (project: dc-staging, .env: staging)
#
# Postgres + Caddy live in a separate "data" stack at /opt/deliverycentral-data/
# so they can be shared across both environments (saves ~700 MB on the 8 GB VM).
# This compose joins the external `dc-shared` network created by the data stack.
#
# CI exports BACKEND_IMAGE / FRONTEND_IMAGE per deploy. Defaults let an operator
# bring the stack up by hand without any CI run (`:latest` is rebuilt on every
# main push).

services:
  migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/local/deliverycentral-backend:latest}
    pull_policy: always
    environment:
      NODE_ENV: production
      # DM-R-20: opt-in cutover. When MIGRATE_DATABASE_URL is set, migrate
      # connects as `app_migrator` (DDL-permitted; required once DM-R-21's
      # event-trigger DDL lockout is active). When unset, falls back to the
      # legacy DATABASE_URL — matches the dev compose pattern.
      DATABASE_URL: ${MIGRATE_DATABASE_URL:-${DATABASE_URL}}
    networks: [dc-shared]
    # Wait for the shared postgres (in the data stack) to accept connections,
    # then run idempotent migrate deploy. `restart: no` ensures we don't loop
    # forever if a migration fails — the deploy script catches that.
    command: >
      sh -c "until node -e \"require('net').createConnection({host:'postgres',port:5432}).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\" 2>/dev/null; do echo waiting for postgres; sleep 2; done && node_modules/.bin/prisma migrate deploy"
    restart: 'no'

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/local/deliverycentral-backend:latest}
    pull_policy: always
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: ${API_PREFIX:-api}
      CORS_ORIGIN: ${CORS_ORIGIN}
      # DM-R-20: opt-in cutover. When RUNTIME_DATABASE_URL is set, backend
      # connects as `app_runtime` (DML only — DDL is denied at the DB layer).
      # When unset, falls back to the legacy DATABASE_URL.
      DATABASE_URL: ${RUNTIME_DATABASE_URL:-${DATABASE_URL}}
      AUTH_ISSUER: ${AUTH_ISSUER}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_LOCAL_ENABLED: ${AUTH_LOCAL_ENABLED:-true}
      AUTH_LDAP_ENABLED: ${AUTH_LDAP_ENABLED:-false}
      AUTH_LDAP_URL: ${AUTH_LDAP_URL:-}
      AUTH_LDAP_BIND_DN: ${AUTH_LDAP_BIND_DN:-}
      AUTH_LDAP_BIND_CREDENTIALS: ${AUTH_LDAP_BIND_CREDENTIALS:-}
      AUTH_LDAP_SEARCH_BASE: ${AUTH_LDAP_SEARCH_BASE:-}
      AUTH_LDAP_SEARCH_FILTER: ${AUTH_LDAP_SEARCH_FILTER:-(uid={{username}})}
      AUTH_AZURE_AD_ENABLED: ${AUTH_AZURE_AD_ENABLED:-false}
      AUTH_AZURE_AD_TENANT_ID: ${AUTH_AZURE_AD_TENANT_ID:-}
      AUTH_AZURE_AD_CLIENT_ID: ${AUTH_AZURE_AD_CLIENT_ID:-}
      AUTH_AZURE_AD_CLIENT_SECRET: ${AUTH_AZURE_AD_CLIENT_SECRET:-}
      AUTH_AZURE_AD_REDIRECT_URI: ${AUTH_AZURE_AD_REDIRECT_URI:-}
      AUTH_ACCESS_TOKEN_EXPIRES_IN: ${AUTH_ACCESS_TOKEN_EXPIRES_IN:-900}
      AUTH_REFRESH_TOKEN_EXPIRES_IN: ${AUTH_REFRESH_TOKEN_EXPIRES_IN:-604800}
      # No default — must be set explicitly in .env. Compose's --env-file
      # treats `KEY=` as "unset", so a default fallback would silently
      # override the operator's intent to disable 2FA. With no default the
      # value comes through as empty (= 2FA off, the .env-template intent).
      # Operators who want 2FA: set AUTH_2FA_ENFORCE_ROLES=admin,director,...
      # in .env.
      AUTH_2FA_ENFORCE_ROLES: ${AUTH_2FA_ENFORCE_ROLES-}
      AUTH_2FA_TOTP_ISSUER: ${AUTH_2FA_TOTP_ISSUER:-DeliveryCentral}
      # Seed admin credentials — read at app boot by AppConfig validator (rejects
      # default value in production) and by `dist/prisma/seed.js` when seeding.
      SEED_PROFILE: ${SEED_PROFILE:-it-company}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_DISPLAY_NAME: ${SEED_ADMIN_DISPLAY_NAME}
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      NOTIFICATIONS_SMTP_HOST: ${NOTIFICATIONS_SMTP_HOST:-}
      NOTIFICATIONS_SMTP_PORT: ${NOTIFICATIONS_SMTP_PORT:-587}
      NOTIFICATIONS_SMTP_SECURE: ${NOTIFICATIONS_SMTP_SECURE:-false}
      NOTIFICATIONS_SMTP_USERNAME: ${NOTIFICATIONS_SMTP_USERNAME:-}
      NOTIFICATIONS_SMTP_PASSWORD: ${NOTIFICATIONS_SMTP_PASSWORD:-}
      NOTIFICATIONS_EMAIL_FROM_ADDRESS: ${NOTIFICATIONS_EMAIL_FROM_ADDRESS}
      NOTIFICATIONS_EMAIL_FROM_NAME: ${NOTIFICATIONS_EMAIL_FROM_NAME:-DeliveryCentral}
      SERVICE_NAME: ${SERVICE_NAME:-deliverycentral}
      LOG_LEVEL: ${LOG_LEVEL:-log,warn,error}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks: [dc-shared]
    # DM-R-8 — deep probe exercises every aggregate root through Prisma.
    # The container is only marked healthy when /api/health/deep returns
    # "status":"ready" — a half-applied migration or a broken aggregate
    # keeps the orchestrator from routing traffic to a wounded backend.
    healthcheck:
      test:
        - 'CMD-SHELL'
        - 'wget -q -O - http://127.0.0.1:3000/api/health/deep 2>&1 | grep -q "\"status\":\"ready\"" || exit 1'
      interval: 10s
      timeout: 8s
      retries: 20
      start_period: 30s
    restart: unless-stopped
    # INFRA-04: bound the backend so a runaway request handler or memory leak
    # cannot starve postgres + caddy on the shared CX13 (8 GB / 2 vCPU).
    deploy:
      resources:
        limits:
          memory: 1500M
          cpus: '1.5'
        reservations:
          memory: 512M
    # docker compose (non-swarm) honors `mem_limit`/`cpus` directly — `deploy.resources`
    # is read by Swarm only — so we duplicate as plain top-level keys.
    mem_limit: 1500m
    mem_reservation: 512m
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/local/deliverycentral-frontend:latest}
    pull_policy: always
    depends_on:
      backend:
        condition: service_healthy
    networks: [dc-shared]
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:8080/ > /dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    # INFRA-04: nginx is light; a tight cap protects against unexpected leaks.
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

  # --- monitoring profile (opt-in via --profile monitoring) ---------------
  # uptime-kuma, dozzle, and Caddy live in the data stack (one instance for
  # both prod and staging). issue-reporter stays here because it is
  # environment-aware (different repo / labels per stack).
  issue-reporter:
    profiles: ['monitoring']
    build:
      context: ./ops/issue-reporter
    container_name: ${COMPOSE_PROJECT_NAME:-dc}-issue-reporter
    environment:
      ISSUE_REPORTER_GITHUB_TOKEN: ${ISSUE_REPORTER_GITHUB_TOKEN:-}
      ISSUE_REPORTER_GITHUB_REPO: ${ISSUE_REPORTER_GITHUB_REPO:-}
      ISSUE_REPORTER_ENVIRONMENT: ${ISSUE_REPORTER_ENVIRONMENT:-prod}
      ISSUE_REPORTER_LOG_LINES: ${ISSUE_REPORTER_LOG_LINES:-200}
      ISSUE_REPORTER_OWN_CONTAINER: ${COMPOSE_PROJECT_NAME:-dc}-issue-reporter
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./.current-sha:/host/current-sha:ro
    networks: [dc-shared]
    restart: unless-stopped

# Joined to the shared network created by /opt/deliverycentral-data/docker-compose.yml.
# `external: true` means this stack does NOT create the network — it expects it
# to exist. The data stack must be brought up first.
networks:
  dc-shared:
    name: dc-shared
    external: true
